name: Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:


permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # get access to your portfolio code
      - name: Checkout code
        uses: actions/checkout@v4

      # setup github pages
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      # static code artifacts are stored in the pages build directory
      - name: Upload static files
        uses: actions/upload-pages-artifact@v4
        with:
          name: pages-build
          path: .

      # deploy to github pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

            


              